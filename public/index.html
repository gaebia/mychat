<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .video-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            max-height: 300px;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #aaa;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .controls button {
            padding: 6px 14px;
            border: 1px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .controls button.active {
            background: #2b6bff;
            border-color: #2b6bff;
            color: #fff;
        }
        .controls button#locationBtn:hover {
            background: #2b6bff;
            border-color: #2b6bff;
            color: #fff;
        }

        .chat-area {
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 200px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 300px;
            min-height: 120px;
        }
        .message {
            max-width: 80%;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.3;
            word-wrap: break-word;
        }
        .message.me {
            align-self: flex-end;
            background: #2b6bff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #2a2a2a;
            color: #eee;
            border-bottom-left-radius: 4px;
        }
        .message .translated {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
            font-style: italic;
        }
        .message a {
            color: #4a9eff;
            text-decoration: none;
        }
        .message a:hover {
            text-decoration: underline;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 8px 10px;
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
            border-radius: 0 0 12px 12px;
        }
        .input-area input {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #2a2a2a;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #2b6bff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            body { padding: 4px; }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .video-wrapper {
                max-height: 200px;
                aspect-ratio: 16/9;
            }
            .controls button { font-size: 10px; padding: 4px 10px; }
            .chat-area { min-height: 150px; }
            .messages { max-height: 200px; min-height: 80px; }
            .message { font-size: 12px; padding: 5px 10px; }
            .input-area input { font-size: 12px; padding: 6px 10px; }
            .input-area button { font-size: 12px; padding: 6px 12px; }
            .video-label { font-size: 9px; padding: 2px 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-grid">
        <div class="video-wrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="video-label">📸 Tu</span>
        </div>
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="video-label">👤 Compagna</span>
        </div>
    </div>

    <div class="controls">
        <button id="micBtn" class="active">🎤 Microfono</button>
        <button id="camBtn" class="active">📷 Camera</button>
        <button id="langBtn">🇮🇹 IT → PL 🇵🇱</button>
        <button id="locationBtn">📍 Posizione</button>
    </div>

    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Scrivi un messaggio..." />
            <button id="sendBtn">Invia</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const camBtn = document.getElementById('camBtn');
    const langBtn = document.getElementById('langBtn');
    const locationBtn = document.getElementById('locationBtn');

    let localStream, peerConnection;
    let micEnabled = true, camEnabled = true;
    let currentLang = 'it';

    const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: camEnabled, audio: micEnabled });
            localVideo.srcObject = localStream;
            createPeerConnection();
        } catch (e) { console.error('Errore camera:', e); }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (event) => { remoteVideo.srcObject = event.streams[0]; };
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) socket.emit('candidate', event.candidate);
        };
        if (!window._offerSent) {
            window._offerSent = true;
            setTimeout(() => {
                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => socket.emit('offer', peerConnection.localDescription))
                    .catch(console.error);
            }, 500);
        }
    }

    socket.on('offer', async (offer) => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        }
    });

    socket.on('answer', (answer) => {
        if (peerConnection) peerConnection.setRemoteDescription(answer);
    });

    socket.on('candidate', (candidate) => {
        if (peerConnection) peerConnection.addIceCandidate(candidate);
    });

    // === POSIZIONE ===
    function sendLocation() {
        if (!navigator.geolocation) {
            alert('Il tuo browser non supporta la geolocalizzazione.');
            return;
        }

        locationBtn.textContent = '⏳ Caricamento...';
        locationBtn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude } = position.coords;
                const accuracy = position.coords.accuracy;

                // Link Google Maps con Street View
                const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}&layer=c&cbll=${latitude},${longitude}`;
                const streetViewLink = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${latitude},${longitude}`;

                const message = `📍 Posizione:\n📌 Mappa: ${mapsLink}\n🔄 Street View: ${streetViewLink}\n📏 Precisione: ${Math.round(accuracy)}m`;

                socket.emit('message', { text: message, lang: 'it' });
                addMessage('📍 Posizione condivisa!', 'me', '');

                locationBtn.textContent = '📍 Posizione';
                locationBtn.disabled = false;
            },
            (error) => {
                console.error('Errore posizione:', error);
                alert('Errore nel recuperare la posizione: ' + error.message);
                locationBtn.textContent = '📍 Posizione';
                locationBtn.disabled = false;
            },
            {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            }
        );
    }

    locationBtn.addEventListener('click', sendLocation);

    // === MESSAGGI ===
    function sendMessage(text) {
        if (!text.trim()) return;
        socket.emit('message', { text: text.trim(), lang: currentLang });
        addMessage(text, 'me', '');
        msgInput.value = '';
    }

    socket.on('message', (data) => {
        addMessage(data.original, 'other', data.translated);
    });

    function addMessage(text, type, translated) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        // Converti i link in cliccabili
        const formattedText = text.replace(
            /(https?:\/\/[^\s]+)/g,
            (url) => `<a href="${url}" target="_blank">${url}</a>`
        );
        div.innerHTML = formattedText;

        if (translated && translated !== text) {
            const small = document.createElement('div');
            small.className = 'translated';
            small.textContent = `📝 ${translated}`;
            div.appendChild(small);
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    // === PULSANTI ===
    langBtn.addEventListener('click', function() {
        if (currentLang === 'it') {
            currentLang = 'pl';
            this.textContent = '🇵🇱 PL → IT 🇮🇹';
            this.style.background = '#2b6bff';
            this.style.borderColor = '#2b6bff';
            this.style.color = '#fff';
        } else {
            currentLang = 'it';
            this.textContent = '🇮🇹 IT → PL 🇵🇱';
            this.style.background = 'transparent';
            this.style.borderColor = '#333';
            this.style.color = '#ccc';
        }
        console.log('🔁 Lingua cambiata a:', currentLang);
    });

    sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(msgInput.value);
    });

    micBtn.addEventListener('click', () => {
        micEnabled = !micEnabled;
        micBtn.textContent = micEnabled ? '🎤 Microfono' : '🔇 Microfono';
        micBtn.classList.toggle('active', micEnabled);
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
    });

    camBtn.addEventListener('click', () => {
        camEnabled = !camEnabled;
        camBtn.textContent = camEnabled ? '📷 Camera' : '🚫 Camera';
        camBtn.classList.toggle('active', camEnabled);
        if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
    });

    startCamera();
    setTimeout(() => { if (!peerConnection) createPeerConnection(); }, 3000);
</script>
</body>
</html>
