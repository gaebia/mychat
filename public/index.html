<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body {
            background: #0f0f0f;
            color: #fff;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            touch-action: pan-y;
        }

        /* VIDEO */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            flex: 1.8;
            padding: 6px;
            background: #1a1a1a;
            min-height: 0;
            touch-action: none;
        }
        .video-wrapper {
            position: relative;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
        }
        .video-label {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.6);
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 10px;
            color: #aaa;
        }

        /* CONTROLLI */
        .controls {
            display: flex;
            gap: 8px;
            padding: 4px 8px;
            background: #0f0f0f;
            justify-content: center;
            flex-shrink: 0;
            touch-action: none;
        }
        .controls button {
            padding: 4px 12px;
            border: 1px solid #333;
            border-radius: 16px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 10px;
            transition: 0.2s;
            touch-action: none;
        }
        .controls button.active {
            background: #2b6bff;
            border-color: #2b6bff;
            color: #fff;
        }

        /* CHAT */
        .chat-area {
            display: flex;
            flex-direction: column;
            flex: 1.2;
            min-height: 120px;
            max-height: 30vh;
            background: #1a1a1a;
            border-top: 1px solid #333;
            touch-action: pan-y;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 100%;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.3;
            word-wrap: break-word;
        }
        .message.me {
            align-self: flex-end;
            background: #2b6bff;
            color: #fff;
            border-bottom-right-radius: 3px;
        }
        .message.other {
            align-self: flex-start;
            background: #2a2a2a;
            color: #eee;
            border-bottom-left-radius: 3px;
        }
        .message .translated {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 6px;
            padding: 6px 8px;
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
            min-height: 44px;
        }
        .input-area input {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #2a2a2a;
            color: #fff;
            font-size: 13px;
            outline: none;
            min-width: 0;
            height: 36px;
            touch-action: none;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #2b6bff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            height: 36px;
            touch-action: none;
        }

        @media (max-width: 600px) {
            .video-grid {
                grid-template-columns: 1fr;
                flex: 1.2;
                gap: 4px;
                padding: 4px;
            }
            .video-wrapper {
                min-height: 80px;
                border-radius: 6px;
            }
            .chat-area {
                min-height: 100px;
                max-height: 32vh;
            }
            .message {
                max-width: 90%;
                font-size: 11px;
                padding: 4px 8px;
            }
            .message .translated {
                font-size: 9px;
            }
            .input-area {
                padding: 4px 6px;
                gap: 4px;
                min-height: 38px;
            }
            .input-area input {
                padding: 6px 10px;
                font-size: 12px;
                height: 30px;
                border-radius: 16px;
            }
            .input-area button {
                padding: 6px 12px;
                font-size: 12px;
                height: 30px;
            }
            .controls button {
                padding: 2px 8px;
                font-size: 9px;
            }
            .video-label {
                font-size: 8px;
                padding: 1px 6px;
                bottom: 3px;
                left: 3px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- VIDEO -->
    <div class="video-grid">
        <div class="video-wrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="video-label">📸 Tu</span>
        </div>
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="video-label">👤 Compagna</span>
        </div>
    </div>

    <!-- CONTROLLI -->
    <div class="controls">
        <button id="micBtn" class="active">🎤 Microfono</button>
        <button id="camBtn" class="active">📷 Camera</button>
        <button id="langBtn">🌐 IT → PL</button>
    </div>

    <!-- CHAT -->
    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Scrivi..." />
            <button id="sendBtn">Invia</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const camBtn = document.getElementById('camBtn');
    const langBtn = document.getElementById('langBtn');

    let localStream, peerConnection;
    let micEnabled = true, camEnabled = true;

    const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function startCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: camEnabled, audio: micEnabled });
            localVideo.srcObject = localStream;
            createPeerConnection();
        } catch (e) { console.error('Errore camera:', e); }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (event) => { remoteVideo.srcObject = event.streams[0]; };
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) socket.emit('candidate', event.candidate);
        };
        if (!window._offerSent) {
            window._offerSent = true;
            setTimeout(() => {
                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => socket.emit('offer', peerConnection.localDescription))
                    .catch(console.error);
            }, 500);
        }
    }

    socket.on('offer', async (offer) => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        }
    });

    socket.on('answer', (answer) => {
        if (peerConnection) peerConnection.setRemoteDescription(answer);
    });

    socket.on('candidate', (candidate) => {
        if (peerConnection) peerConnection.addIceCandidate(candidate);
    });

    function sendMessage(text) {
        if (!text.trim()) return;
        const lang = langBtn.textContent.includes('PL') ? 'it' : 'pl';
        socket.emit('message', { text: text.trim(), lang });
        msgInput.value = '';
    }

    socket.on('message', (data) => {
        const div = document.createElement('div');
        div.className = 'message other';
        div.innerHTML = data.original;
        if (data.translated && data.translated !== data.original) {
            const small = document.createElement('div');
            small.className = 'translated';
            small.textContent = `📝 ${data.translated}`;
            div.appendChild(small);
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    });

    sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(msgInput.value);
    });

    micBtn.addEventListener('click', () => {
        micEnabled = !micEnabled;
        micBtn.textContent = micEnabled ? '🎤 Microfono' : '🔇 Microfono';
        micBtn.classList.toggle('active', micEnabled);
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
    });

    camBtn.addEventListener('click', () => {
        camEnabled = !camEnabled;
        camBtn.textContent = camEnabled ? '📷 Camera' : '🚫 Camera';
        camBtn.classList.toggle('active', camEnabled);
        if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
    });

    langBtn.addEventListener('click', () => {
        const current = langBtn.textContent.includes('PL') ? 'IT' : 'PL';
        langBtn.textContent = current === 'IT' ? '🌐 IT → PL' : '🌐 PL → IT';
    });

    startCamera();
    setTimeout(() => { if (!peerConnection) createPeerConnection(); }, 3000);
</script>
</body>
</html>
