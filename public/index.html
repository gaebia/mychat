<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 8px;
            flex: 1;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 12px;
        }
        .video-wrapper {
            position: relative;
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 16/9;
            min-height: 120px;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #0f0f0f;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 18px;
            border: 1px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .controls button.active {
            background: #2b6bff;
            border-color: #2b6bff;
            color: #fff;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border-radius: 12px;
            margin-top: 8px;
            flex: 1;
            min-height: 250px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 150px;
            max-height: 400px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.me {
            align-self: flex-end;
            background: #2b6bff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #2a2a2a;
            color: #eee;
            border-bottom-left-radius: 4px;
        }
        .message .translated {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
            border-radius: 0 0 12px 12px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
            min-width: 60px;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: #2b6bff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .container { padding: 4px; }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 4px;
            }
            .video-wrapper {
                aspect-ratio: 16/9;
                min-height: 80px;
            }
            .controls button {
                font-size: 11px;
                padding: 6px 12px;
            }
            .chat-area { min-height: 200px; }
            .messages { max-height: 250px; min-height: 100px; }
            .message {
                max-width: 90%;
                font-size: 13px;
                padding: 6px 12px;
            }
            .input-area input {
                font-size: 13px;
                padding: 8px 12px;
            }
            .input-area button {
                font-size: 13px;
                padding: 8px 14px;
            }
            .video-label {
                font-size: 10px;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-grid">
        <div class="video-wrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="video-label">📸 Tu</span>
        </div>
        <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="video-label">👤 Compagna</span>
        </div>
    </div>

    <div class="controls">
        <button id="micBtn" class="active">🎤 Microfono</button>
        <button id="camBtn" class="active">📷 Camera</button>
        <button id="langBtn">🌐 IT → PL</button>
    </div>

    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Scrivi un messaggio..." />
            <button id="sendBtn">Invia</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const camBtn = document.getElementById('camBtn');
    const langBtn = document.getElementById('langBtn');

    let localStream, peerConnection;
    let micEnabled = true, camEnabled = true;

    const servers = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    async function startCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: camEnabled,
                audio: micEnabled
            });
            localVideo.srcObject = localStream;
            createPeerConnection();
        } catch (e) {
            console.error('Errore camera:', e);
        }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(servers);
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            remoteVideo.srcObject = event.streams[0];
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) socket.emit('candidate', event.candidate);
        };

        if (!window._offerSent) {
            window._offerSent = true;
            setTimeout(createOffer, 500);
        }
    }

    function createOffer() {
        peerConnection.createOffer()
            .then(offer => peerConnection.setLocalDescription(offer))
            .then(() => socket.emit('offer', peerConnection.localDescription))
            .catch(console.error);
    }

    socket.on('offer', async (offer) => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        }
    });

    socket.on('answer', (answer) => {
        if (peerConnection) peerConnection.setRemoteDescription(answer);
    });

    socket.on('candidate', (candidate) => {
        if (peerConnection) peerConnection.addIceCandidate(candidate);
    });

    function sendMessage(text) {
        if (!text.trim()) return;
        const lang = langBtn.textContent.includes('PL') ? 'it' : 'pl';
        socket.emit('message', { text: text.trim(), lang });
        addMessage(text, 'me', '');
        msgInput.value = '';
    }

    socket.on('message', (data) => {
        addMessage(data.original, 'other', data.translated);
    });

    function addMessage(text, type, translated) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = text;
        if (translated && translated !== text) {
            const small = document.createElement('div');
            small.className = 'translated';
            small.textContent = `📝 ${translated}`;
            div.appendChild(small);
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(msgInput.value);
    });

    micBtn.addEventListener('click', () => {
        micEnabled = !micEnabled;
        micBtn.textContent = micEnabled ? '🎤 Microfono' : '🔇 Microfono';
        micBtn.classList.toggle('active', micEnabled);
        if (localStream) {
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
        }
    });

    camBtn.addEventListener('click', () => {
        camEnabled = !camEnabled;
        camBtn.textContent = camEnabled ? '📷 Camera' : '🚫 Camera';
        camBtn.classList.toggle('active', camEnabled);
        if (localStream) {
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
        }
    });

    langBtn.addEventListener('click', () => {
        const current = langBtn.textContent.includes('PL') ? 'IT' : 'PL';
        langBtn.textContent = current === 'IT' ? '🌐 IT → PL' : '🌐 PL → IT';
    });

    startCamera();
    setTimeout(() => {
        if (!peerConnection) createPeerConnection();
    }, 3000);
</script>
</body>
</html>
