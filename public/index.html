<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* LAYOUT PRINCIPALE */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* VIDEO (2 schermi) */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex: 2;
            padding: 8px;
            background: #1a1a1a;
            min-height: 0;
        }
        .video-wrapper {
            position: relative;
            background: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
        }

        /* AREA CHAT E TRADUZIONE */
        .chat-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 200px;
            max-height: 35vh;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        /* MESSAGGI */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.me {
            align-self: flex-end;
            background: #2b6bff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #2a2a2a;
            color: #eee;
            border-bottom-left-radius: 4px;
        }
        .message .translated {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 2px;
            font-style: italic;
        }

        /* INPUT */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: #2b6bff;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover {
            background: #1a5bff;
        }

        /* CONTROLLI AUDIO/VIDEO */
        .controls {
            display: flex;
            gap: 12px;
            padding: 8px 12px;
            background: #0f0f0f;
            justify-content: center;
        }
        .controls button {
            padding: 6px 16px;
            border: 1px solid #333;
            border-radius: 20px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .controls button:hover {
            background: #2a2a2a;
        }
        .controls button.active {
            background: #2b6bff;
            border-color: #2b6bff;
            color: #fff;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .video-grid {
                grid-template-columns: 1fr;
                flex: 1.5;
            }
            .video-wrapper {
                min-height: 100px;
            }
            .chat-area {
                min-height: 150px;
                max-height: 40vh;
            }
            .message {
                max-width: 90%;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- VIDEO -->
    <div class="video-grid">
        <div class="video-wrapper" id="localVideoWrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <span class="video-label">📸 Tu</span>
        </div>
        <div class="video-wrapper" id="remoteVideoWrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="video-label">👤 Compagna</span>
        </div>
    </div>

    <!-- CONTROLLI -->
    <div class="controls">
        <button id="micBtn" class="active">🎤 Microfono</button>
        <button id="camBtn" class="active">📷 Camera</button>
        <button id="langBtn">🌐 IT → PL</button>
    </div>

    <!-- CHAT -->
    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Scrivi un messaggio..." />
            <button id="sendBtn">Invia</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const messages = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const camBtn = document.getElementById('camBtn');
    const langBtn = document.getElementById('langBtn');

    let localStream;
    let peerConnection;
    let lang = 'it'; // it o pl
    let micEnabled = true;
    let camEnabled = true;

    const servers = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
        ]
    };

    // === WEBCAM ===
    async function startCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: camEnabled,
                audio: micEnabled
            });
            localVideo.srcObject = localStream;
            createPeerConnection();
            return true;
        } catch (e) {
            console.error('Errore camera:', e);
            return false;
        }
    }

    // === PEER CONNECTION ===
    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(servers);

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = (event) => {
            remoteVideo.srcObject = event.streams[0];
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('candidate', event.candidate);
            }
        };

        // Se siamo il primo, creiamo offerta
        if (!window._offerSent) {
            window._offerSent = true;
            setTimeout(createOffer, 500);
        }
    }

    function createOffer() {
        peerConnection.createOffer()
            .then(offer => peerConnection.setLocalDescription(offer))
            .then(() => {
                socket.emit('offer', peerConnection.localDescription);
            })
            .catch(console.error);
    }

    // === SOCKET EVENTS ===
    socket.on('offer', async (offer) => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        }
    });

    socket.on('answer', (answer) => {
        if (peerConnection) {
            peerConnection.setRemoteDescription(answer);
        }
    });

    socket.on('candidate', (candidate) => {
        if (peerConnection) {
            peerConnection.addIceCandidate(candidate);
        }
    });

    // === MESSAGGI ===
    function sendMessage(text) {
        if (!text.trim()) return;
        const lang = document.getElementById('langBtn').textContent.includes('PL') ? 'it' : 'pl';
        socket.emit('message', { text: text.trim(), lang: lang });
        addMessage(text, 'me', '');
        msgInput.value = '';
    }

    socket.on('message', (data) => {
        const label = data.lang === 'it' ? 'Tu (IT)' : 'Lei (PL)';
        addMessage(data.original, 'other', data.translated);
    });

    function addMessage(text, type, translated) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = text;
        if (translated) {
            const small = document.createElement('div');
            small.className = 'translated';
            small.textContent = `📝 ${translated}`;
            div.appendChild(small);
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    // === EVENTI UI ===
    sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage(msgInput.value);
    });

    micBtn.addEventListener('click', () => {
        micEnabled = !micEnabled;
        micBtn.textContent = micEnabled ? '🎤 Microfono' : '🔇 Microfono';
        micBtn.classList.toggle('active', micEnabled);
        if (localStream) {
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
        }
    });

    camBtn.addEventListener('click', () => {
        camEnabled = !camEnabled;
        camBtn.textContent = camEnabled ? '📷 Camera' : '🚫 Camera';
        camBtn.classList.toggle('active', camEnabled);
        if (localStream) {
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
        }
    });

    langBtn.addEventListener('click', () => {
        const current = langBtn.textContent.includes('PL') ? 'IT' : 'PL';
        langBtn.textContent = current === 'IT' ? '🌐 IT → PL' : '🌐 PL → IT';
    });

    // === AVVIO ===
    startCamera();

    // Riconnessione se si perde la connessione
    setTimeout(() => {
        if (!peerConnection) {
            createPeerConnection();
        }
    }, 3000);
</script>
</body>
</html>
